<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Eventos APS</title>
    <link href="hero-styles.css" rel="stylesheet">
    <link href="digital-architect.aura.build/assets/css2_19fd9cc6b396.css" rel="stylesheet">
    <style>
        body {
            background-color: #F9F4E8;
            color: #1a1a1a;
            font-family: 'Inter', sans-serif;
            padding: 2rem;
        }
        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            position: static;
            padding: 0;
            background: none;
        }
        .event-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .event-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0;
        }
        .event-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 600;
            font-size: 0.9rem;
        }
        input, textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
        }
        .upload-row {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.3rem;
        }
        .btn-upload {
            background: #e0e0e0;
            color: #333;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .btn-delete {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-save {
            background: #2a5c4d;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            display: block;
            margin: 2rem auto;
        }
        .btn-add {
             background: #2a5c4d;
             color: white;
             border: none;
             padding: 0.8rem 1.5rem;
             border-radius: 8px;
             cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <header>
            <h1>Painel de Controle de Eventos</h1>
            <button class="btn-add" onclick="showModal()">+ Adicionar Novo</button>
        </header>

        <div id="events-list" class="event-grid">
            <!-- Loaded via JS -->
        </div>

        <button class="btn-save" onclick="saveAll()">Salvar Todas as Alterações</button>
    </div>

    <!-- Add Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2>Novo Evento</h2>
            <div class="form-group">
                <label>Título</label>
                <input type="text" id="new-title" placeholder="Ex: Campanha ABCS">
            </div>
            <div class="form-group">
                <label>Descrição</label>
                <textarea id="new-desc" rows="3" placeholder="Descrição do evento..."></textarea>
            </div>
            <div class="form-group">
                <label>Imagem</label>
                <div class="upload-row">
                    <input type="text" id="new-image" placeholder="Caminho da imagem...">
                    <input type="file" id="new-file-input" style="display:none" onchange="uploadImage(null, this.files[0], 'new-image')">
                    <button class="btn-upload" onclick="document.getElementById('new-file-input').click()">Upload</button>
                </div>
            </div>
            <div class="form-group">
                <label>Link (URL)</label>
                <input type="text" id="new-link" placeholder="https://...">
            </div>
            <div class="actions">
                <button class="btn-add" onclick="addEvent()">Adicionar</button>
                <button class="btn-delete" style="background:#666" onclick="hideModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let events = [];

        async function fetchEvents() {
            const res = await fetch('/api/events');
            events = await res.json();
            renderEvents();
        }

        function renderEvents() {
            const container = document.getElementById('events-list');
            container.innerHTML = '';
            events.forEach((event, index) => {
                container.innerHTML += `
                    <div class="event-card">
                        <img src="${event.image}" alt="">
                        <div class="form-group">
                            <label>Título</label>
                            <input type="text" value="${event.title}" onchange="updateEvent(${index}, 'title', this.value)">
                        </div>
                        <div class="form-group">
                            <label>Imagem</label>
                            <div class="upload-row">
                                <input type="text" value="${event.image}" id="img-path-${index}" onchange="updateEvent(${index}, 'image', this.value)">
                                <input type="file" id="file-input-${index}" style="display:none" onchange="uploadImage(${index}, this.files[0])">
                                <button class="btn-upload" onclick="document.getElementById('file-input-${index}').click()">Upload</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Link</label>
                            <input type="text" value="${event.link}" onchange="updateEvent(${index}, 'link', this.value)">
                        </div>
                        <div class="form-group">
                            <label>Descrição</label>
                            <textarea rows="3" onchange="updateEvent(${index}, 'description', this.value)">${event.description}</textarea>
                        </div>
                        <button class="btn-delete" onclick="deleteEvent(${index})">Excluir</button>
                    </div>
                `;
            });
        }

        function updateEvent(index, field, value) {
            events[index][field] = value;
        }

        function deleteEvent(index) {
            if(confirm('Tem certeza que deseja excluir?')) {
                events.splice(index, 1);
                renderEvents();
            }
        }

        function showModal() { document.getElementById('modal').style.display = 'flex'; }
        function hideModal() { document.getElementById('modal').style.display = 'none'; }

        function addEvent() {
            const title = document.getElementById('new-title').value;
            const description = document.getElementById('new-desc').value;
            const image = document.getElementById('new-image').value;
            const link = document.getElementById('new-link').value;

            events.push({ title, description, image, link });
            hideModal();
            renderEvents();
            
            // Clear inputs
            document.getElementById('new-title').value = '';
            document.getElementById('new-desc').value = '';
            document.getElementById('new-image').value = '';
            document.getElementById('new-link').value = '';
        }

        async function uploadImage(index, file, targetId) {
            if (!file) return;
            
            const formData = new FormData();
            formData.append('image', file);

            const btn = index !== null ? document.querySelector(`.event-card:nth-child(${index+1}) .btn-upload`) : document.querySelector('.modal .btn-upload');
            const originalText = btn.innerText;
            btn.innerText = 'Subindo...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if (index !== null) {
                    events[index].image = data.filePath;
                    renderEvents();
                } else if (targetId) {
                    document.getElementById(targetId).value = data.filePath;
                }
                alert('Imagem enviada com sucesso!');
            } catch (err) {
                console.error(err);
                alert('Erro no upload.');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        async function saveAll() {
            const res = await fetch('/api/events', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(events)
            });
            if (res.ok) {
                alert('Salvo com sucesso!');
            } else {
                alert('Erro ao salvar.');
            }
        }

        fetchEvents();
    </script>
</body>
</html>
